<script>

/**
 * ============================================================================
 * Animations & Micro-interactions
 * ============================================================================
 *
 * Purpose:
 * Choreographs all programmatic motion within the application to provide a
 * polished, premium SaaS feel.
 *
 * Architecture:
 * - Leverages Motion One for performant hardware-accelerated animations.
 * - Uses `requestAnimationFrame` for smooth number counting.
 * - Safe fallbacks implemented in case CDN fails to load.
 *
 * ============================================================================
 */

'use strict';

const Animations = {

  //==========================================================================
  // Core Methods
  //==========================================================================

  /**
   * Triggers the sequence of entrance animations for dynamic content.
   * Called by the Dashboard render lifecycle once the DOM is populated.
   */
  staggerEntrance() {
    this.animateStaggerItems();
    this.animateProgressBars();
    this.animateNumbers();
  },

  //==========================================================================
  // Animation Definitions
  //==========================================================================

  /**
   * Animates DOM elements with the '.stagger-item' class.
   * Creates a cascading slide-up and fade-in effect.
   */
  animateStaggerItems() {
    const items = document.querySelectorAll('.stagger-item');
    if (!items.length) return;

    // Use Motion One if available globally, otherwise fallback to CSS transitions
    if (typeof Motion !== 'undefined' && Motion.animate) {
      Motion.animate(
        items,
        { opacity: [0, 1], y: [15, 0] },
        { 
          delay: Motion.stagger(0.05, { startDelay: 0.1 }),
          duration: 0.5, 
          easing: [0.16, 1, 0.3, 1] // Custom cubic-bezier for a snappy, premium feel
        }
      );
    } else {
      // Fallback: CSS Transition Injection
      items.forEach((item, i) => {
        item.style.transition = `all 0.5s cubic-bezier(0.16, 1, 0.3, 1) ${i * 0.05}s`;
        
        // Force reflow
        void item.offsetWidth;
        
        item.classList.remove('opacity-0');
        item.classList.add('opacity-100');
        item.style.transform = 'translateY(0)';
      });
    }
  },

  /**
   * Smoothly expands budget and savings progress bars from 0 to their target.
   */
  animateProgressBars() {
    const bars = document.querySelectorAll('[data-progress]');
    
    bars.forEach((bar) => {
      const targetWidth = bar.getAttribute('data-progress');
      
      // We use a slight delay to allow the card entrance animation to start first
      setTimeout(() => {
        bar.style.width = `${targetWidth}%`;
      }, 300);
    });
  },

  /**
   * Animates numbers counting up from 0 to their target value.
   * Perfect for KPI cards to create a sense of data flowing in.
   */
  animateNumbers() {
    const counters = document.querySelectorAll('[data-counter]');

    counters.forEach(counter => {
      const target = parseFloat(counter.getAttribute('data-counter')) || 0;
      const currency = counter.getAttribute('data-currency') || '₦';
      
      // Determine if we should format as compact (e.g., 1.5M) based on size
      const useCompact = target >= 1000;
      const duration = 1200; // ms
      
      if (typeof Motion !== 'undefined' && Motion.animate) {
        // Motion One tweening
        Motion.animate(0, target, {
          duration: duration / 1000,
          easing: [0.16, 1, 0.3, 1],
          onUpdate: (latest) => {
            counter.textContent = this._format(latest, currency, useCompact);
          }
        });
      } else {
        // Fallback: requestAnimationFrame custom tween
        let startTimestamp = null;
        const step = (timestamp) => {
          if (!startTimestamp) startTimestamp = timestamp;
          const progress = Math.min((timestamp - startTimestamp) / duration, 1);
          
          // easeOutQuart
          const easeProgress = 1 - Math.pow(1 - progress, 4);
          const currentVal = target * easeProgress;
          
          counter.textContent = this._format(currentVal, currency, useCompact);
          
          if (progress < 1) {
            window.requestAnimationFrame(step);
          } else {
            counter.textContent = this._format(target, currency, useCompact); // Ensure exact final value
          }
        };
        window.requestAnimationFrame(step);
      }
    });
  },

  //==========================================================================
  // Utility
  //==========================================================================

  /**
   * Internal formatting helper for the animation loop to prevent duplicating
   * logic from the Components module.
   * @private
   */
  _format(value, currency, compact) {
    if (compact) {
      if (value >= 1000000) {
        return `${currency}${(value / 1000000).toFixed(1)}M`;
      } else if (value >= 1000) {
        return `${currency}${(value / 1000).toFixed(1)}K`;
      }
    }
    
    // Default format
    return `${currency}${Math.floor(value).toLocaleString('en-US')}`;
  }

};
</script>
