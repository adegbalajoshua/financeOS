<script>
/**
 * ============================================================================
 * Core Application Logic & State Management
 * ============================================================================
 */

'use strict';

const App = {

  state: {
    payload: null,
    isFetching: false,
    theme: 'light',
    hasInitialized: false,
    modalOpen: false,
    editingTransactionId: null,
    manageData: null,
    manageTab: 'accounts',
    editingAccountName: null
  },

  async init() {
    this.printSignature();
    this.initTheme();
    this.initFAB();
    this.initModal();
    this.initTrendsModal();
    this.initManageModal();
    this.bindEvents();
    
    await this.fetchData();
  },

  printSignature() {
    console.log(
      '%cFinanceOS%c\nBuilt by Adegbala Joshua\nhttps://github.com/<owner>/financeos',
      'font-size:18px;font-weight:bold;color:#4F46E5;',
      'font-size:12px;color:#64748B;'
    );
  },

  bindEvents() {
    const themeBtn = document.getElementById('theme-toggle');
    if (themeBtn) {
      themeBtn.addEventListener('click', () => this.toggleTheme());
    }

    const refreshBtn = document.getElementById('refresh-btn');
    if (refreshBtn) {
      refreshBtn.addEventListener('click', async () => {
        if (this.state.isFetching) return;
        
        const icon = refreshBtn.querySelector('svg, i');
        if (icon) icon.classList.add('animate-spin');
        
        this.state.hasInitialized = false;
        
        try {
          await this.fetchData(true);
          if (typeof Components !== 'undefined') {
            Components.showToast('Dashboard synced with latest data', 'success');
          }
        } finally {
          const currentIcon = refreshBtn.querySelector('svg, i');
          if (currentIcon) currentIcon.classList.remove('animate-spin');
        }
      });
    }

    const timelineContainer = document.getElementById('timeline-container');
    if (timelineContainer) {
      timelineContainer.addEventListener('click', (e) => {
        const editBtn = e.target.closest('.tx-edit-btn');
        const deleteBtn = e.target.closest('.tx-delete-btn');

        if (editBtn) {
          const tx = (this.state.payload.recentTransactions || [])
            .find(t => t.id === editBtn.dataset.id);
          if (tx) this.openModal(tx.type, tx);
          return;
        }

        if (deleteBtn) {
          this.handleDeleteTransaction(deleteBtn.dataset.id);
        }
      });
    }

    document.getElementById('trends-btn')?.addEventListener('click', () => this.openTrendsModal());
    document.getElementById('manage-btn')?.addEventListener('click', () => this.openManageModal());
  },

  //==========================================================================
  // Data Fetching
  //==========================================================================

  async fetchData(forceRefresh = false) {
    this.state.isFetching = true;

    try {
      let response;
      if (forceRefresh) {
        response = await this.serverCall('forceRefreshDashboard');
      } else {
        response = await this.serverCall('fetchDashboardPayload');
      }

      if (response.error) throw new Error(response.message);

      this.state.payload = response;
      this.render();

    } catch (error) {
      console.error('FinanceOS Fetch Error:', error);
      if (typeof Components !== 'undefined') {
        Components.showToast(error.message || 'Failed to load data', 'error');
      }
    } finally {
      this.state.isFetching = false;
      this.removeInitialLoader();
    }
  },

  serverCall(functionName, ...args) {
    return new Promise((resolve, reject) => {
      if (typeof google === 'undefined' || typeof google.script === 'undefined') {
        reject(new Error('Google Apps Script environment not detected.'));
        return;
      }

      const timeout = setTimeout(() => {
        reject(new Error('Request timed out. Google Sheets took too long to respond.'));
      }, 15000);

      google.script.run
        .withSuccessHandler((res) => {
          clearTimeout(timeout);
          resolve(res);
        })
        .withFailureHandler((err) => {
          clearTimeout(timeout);
          reject(err);
        })
        [functionName](...args);
    });
  },

  //==========================================================================
  // Rendering
  //==========================================================================

  render() {
    if (!this.state.payload) return;

    const subtitle = document.getElementById('cycle-subtitle');
    if (subtitle) {
      subtitle.textContent = `Cycle: ${this.state.payload.cycle}`;
    }

    const currency = (this.state.payload.settings && this.state.payload.settings['Currency']) ? this.state.payload.settings['Currency'] : '₦';
    const modalCurrency = document.getElementById('modal-currency');
    if (modalCurrency) modalCurrency.textContent = currency;

    if (typeof Components !== 'undefined') {
      Components.renderAll(this.state.payload);
    }
    
    if (typeof Charts !== 'undefined') {
      Charts.renderAll(this.state.payload, this.state.theme);
    }

    if (typeof Animations !== 'undefined' && !this.state.hasInitialized) {
      setTimeout(() => {
        Animations.staggerEntrance();
        this.state.hasInitialized = true;
      }, 50);
    }
  },

  removeInitialLoader() {
    const loader = document.getElementById('app-loader');
    const mainContent = document.getElementById('main-content');
    
    if (loader && !loader.classList.contains('hidden')) {
      loader.classList.add('opacity-0');
      if (mainContent) mainContent.classList.remove('opacity-0');
      setTimeout(() => loader.classList.add('hidden'), 500);
    }
  },

  //==========================================================================
  // UI & Interactions
  //==========================================================================

  initTheme() {
    const savedTheme = localStorage.getItem('financeos_theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
      document.documentElement.classList.add('dark');
      this.state.theme = 'dark';
    } else {
      document.documentElement.classList.remove('dark');
      this.state.theme = 'light';
    }
  },

  toggleTheme() {
    const html = document.documentElement;
    html.classList.toggle('dark');
    this.state.theme = html.classList.contains('dark') ? 'dark' : 'light';
    localStorage.setItem('financeos_theme', this.state.theme);

    if (typeof Charts !== 'undefined' && this.state.payload) {
      Charts.updateTheme(this.state.theme);
    }
  },

  initFAB() {
    const fabMain = document.getElementById('fab-main');
    const fabMenu = document.getElementById('fab-menu');
    const fabIcon = document.getElementById('fab-icon');
    let isOpen = false;

    if (!fabMain || !fabMenu) return;

    const toggleMenu = () => {
      isOpen = !isOpen;
      if (isOpen) {
        fabMenu.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
        fabIcon.style.transform = 'rotate(45deg)';
      } else {
        fabMenu.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
        fabIcon.style.transform = 'rotate(0deg)';
      }
    };

    fabMain.addEventListener('click', (e) => { e.stopPropagation(); toggleMenu(); });
    
    document.addEventListener('click', (e) => {
      if (isOpen && !fabMenu.contains(e.target) && !fabMain.contains(e.target)) toggleMenu();
    });

    document.getElementById('btn-add-expense')?.addEventListener('click', () => { toggleMenu(); this.openModal('Expense'); });
    document.getElementById('btn-add-income')?.addEventListener('click', () => { toggleMenu(); this.openModal('Income'); });
    document.getElementById('btn-transfer')?.addEventListener('click', () => { toggleMenu(); this.openModal('Transfer'); });
  },

  //==========================================================================
  // Trends Modal
  //==========================================================================

  initTrendsModal() {
    document.getElementById('trends-modal-backdrop')?.addEventListener('click', () => this.closeTrendsModal());
    document.getElementById('btn-close-trends')?.addEventListener('click', () => this.closeTrendsModal());
  },

  async openTrendsModal() {
    const modal = document.getElementById('trends-modal');
    const panel = document.getElementById('trends-modal-panel');
    if (!modal || !panel) return;

    modal.classList.remove('opacity-0', 'pointer-events-none');
    setTimeout(() => {
      panel.classList.remove('scale-95');
      panel.classList.add('scale-100');
    }, 10);

    try {
      const response = await this.serverCall('fetchTrendsData');
      if (response.error) throw new Error(response.message);

      if (typeof Charts !== 'undefined') {
        Charts.renderTrendsChart(response.cycles, this.state.theme);
      }
    } catch (error) {
      console.error(error);
      if (typeof Components !== 'undefined') {
        Components.showToast(error.message || 'Failed to load trends', 'error');
      }
    }
  },

  closeTrendsModal() {
    const modal = document.getElementById('trends-modal');
    const panel = document.getElementById('trends-modal-panel');
    if (!modal || !panel) return;

    panel.classList.remove('scale-100');
    panel.classList.add('scale-95');
    setTimeout(() => {
      modal.classList.add('opacity-0', 'pointer-events-none');
    }, 200);
  },

  //==========================================================================
  // Manage Modal (Accounts & Budgets)
  //==========================================================================

  initManageModal() {
    document.getElementById('manage-modal-backdrop')?.addEventListener('click', () => this.closeManageModal());
    document.getElementById('btn-close-manage')?.addEventListener('click', () => this.closeManageModal());

    document.getElementById('manage-tab-accounts')?.addEventListener('click', () => this.switchManageTab('accounts'));
    document.getElementById('manage-tab-budgets')?.addEventListener('click', () => this.switchManageTab('budgets'));

    document.getElementById('manage-accounts-list')?.addEventListener('click', (e) => {
      const editBtn = e.target.closest('.account-edit-btn');
      const deactivateBtn = e.target.closest('.account-deactivate-btn');

      if (editBtn) this.populateAccountForm(editBtn.dataset.name);
      if (deactivateBtn) this.handleDeactivateAccount(deactivateBtn.dataset.name);
    });

    document.getElementById('manage-budgets-list')?.addEventListener('click', (e) => {
      const editBtn = e.target.closest('.budget-edit-btn');
      const deleteBtn = e.target.closest('.budget-delete-btn');

      if (editBtn) this.populateBudgetForm(editBtn.dataset.type, editBtn.dataset.category, editBtn.dataset.amount);
      if (deleteBtn) this.handleDeleteBudgetLine(deleteBtn.dataset.type, deleteBtn.dataset.category);
    });

    document.getElementById('account-form')?.addEventListener('submit', (e) => {
      e.preventDefault();
      this.submitAccountForm();
    });

    document.getElementById('account-form-reset')?.addEventListener('click', () => this.resetAccountForm());

    document.getElementById('budget-form')?.addEventListener('submit', (e) => {
      e.preventDefault();
      this.submitBudgetForm();
    });

    document.getElementById('budget-form-reset')?.addEventListener('click', () => this.resetBudgetForm());
  },

  async openManageModal() {
    const modal = document.getElementById('manage-modal');
    const panel = document.getElementById('manage-modal-panel');
    if (!modal || !panel) return;

    modal.classList.remove('opacity-0', 'pointer-events-none');
    setTimeout(() => {
      panel.classList.remove('scale-95');
      panel.classList.add('scale-100');
    }, 10);

    await this.refreshManageData();
  },

  closeManageModal() {
    const modal = document.getElementById('manage-modal');
    const panel = document.getElementById('manage-modal-panel');
    if (!modal || !panel) return;

    panel.classList.remove('scale-100');
    panel.classList.add('scale-95');
    setTimeout(() => {
      modal.classList.add('opacity-0', 'pointer-events-none');
      this.resetAccountForm();
      this.resetBudgetForm();
    }, 200);
  },

  switchManageTab(tab) {
    this.state.manageTab = tab;

    const accountsPanel = document.getElementById('manage-panel-accounts');
    const budgetsPanel = document.getElementById('manage-panel-budgets');
    const accountsTabBtn = document.getElementById('manage-tab-accounts');
    const budgetsTabBtn = document.getElementById('manage-tab-budgets');

    const isAccounts = tab === 'accounts';

    accountsPanel.classList.toggle('hidden', !isAccounts);
    budgetsPanel.classList.toggle('hidden', isAccounts);

    accountsTabBtn.classList.toggle('border-primary', isAccounts);
    accountsTabBtn.classList.toggle('text-primary', isAccounts);
    accountsTabBtn.classList.toggle('border-transparent', !isAccounts);
    accountsTabBtn.classList.toggle('text-slate-500', !isAccounts);

    budgetsTabBtn.classList.toggle('border-primary', !isAccounts);
    budgetsTabBtn.classList.toggle('text-primary', !isAccounts);
    budgetsTabBtn.classList.toggle('border-transparent', isAccounts);
    budgetsTabBtn.classList.toggle('text-slate-500', isAccounts);
  },

  async refreshManageData() {
    try {
      const response = await this.serverCall('fetchManageData');
      if (response.error) throw new Error(response.message);

      this.state.manageData = response;

      if (typeof Components !== 'undefined') {
        Components.renderManageAccounts(response.accounts);
        Components.renderManageBudgets(response.budgets);
      }
    } catch (error) {
      console.error(error);
      if (typeof Components !== 'undefined') {
        Components.showToast(error.message || 'Failed to load accounts and budgets', 'error');
      }
    }
  },

  populateAccountForm(name) {
    const account = (this.state.manageData?.accounts || []).find(a => a.name === name);
    if (!account) return;

    document.getElementById('account-original-name').value = account.name;
    document.getElementById('account-name').value = account.name;
    document.getElementById('account-type').value = account.type;
    document.getElementById('account-balance').value = account.openingBalance;
    document.getElementById('account-active').checked = account.status === 'Active';
  },

  resetAccountForm() {
    document.getElementById('account-form')?.reset();
    document.getElementById('account-original-name').value = '';
    document.getElementById('account-active').checked = true;
  },

  async submitAccountForm() {
    const originalName = document.getElementById('account-original-name').value;
    const name = document.getElementById('account-name').value.trim();

    const formData = {
      name: originalName || name, // updates match on the original name if editing
      type: document.getElementById('account-type').value,
      openingBalance: document.getElementById('account-balance').value,
      status: document.getElementById('account-active').checked ? 'Active' : 'Inactive'
    };

    // If the name itself changed during an edit, this creates a new row
    // rather than renaming in place (findAccountRow matches on the
    // ORIGINAL name). Renaming isn't supported yet, deliberately: renaming
    // would desync every historical transaction row referencing the old name.
    if (originalName && originalName !== name) {
      if (typeof Components !== 'undefined') {
        Components.showToast('Renaming an account isn\'t supported, it would break historical balances. Create a new account instead.', 'error');
      }
      return;
    }

    if (!originalName) {
      formData.name = name;
    }

    try {
      const response = await this.serverCall('submitAccount', formData);
      if (response.error) throw new Error(response.message);

      if (typeof Components !== 'undefined') {
        Components.showToast('Account saved', 'success');
      }

      this.resetAccountForm();
      await this.refreshManageData();
      this.state.hasInitialized = false;
      await this.fetchData(true);

    } catch (error) {
      console.error(error);
      if (typeof Components !== 'undefined') {
        Components.showToast(error.message || 'Failed to save account', 'error');
      }
    }
  },

  async handleDeactivateAccount(name) {
    const confirmed = window.confirm(`Deactivate "${name}"? It'll stop appearing in new transaction dropdowns, but its history is preserved.`);
    if (!confirmed) return;

    try {
      const response = await this.serverCall('deactivateAccount', name);
      if (response.error) throw new Error(response.message);

      if (typeof Components !== 'undefined') {
        Components.showToast('Account deactivated', 'success');
      }

      await this.refreshManageData();
      this.state.hasInitialized = false;
      await this.fetchData(true);

    } catch (error) {
      console.error(error);
      if (typeof Components !== 'undefined') {
        Components.showToast(error.message || 'Failed to deactivate account', 'error');
      }
    }
  },

  populateBudgetForm(type, category, amount) {
    document.getElementById('budget-type').value = type;
    document.getElementById('budget-category').value = category;
    document.getElementById('budget-amount').value = amount;
  },

  resetBudgetForm() {
    document.getElementById('budget-form')?.reset();
  },

  async submitBudgetForm() {
    const formData = {
      type: document.getElementById('budget-type').value,
      category: document.getElementById('budget-category').value.trim(),
      amount: document.getElementById('budget-amount').value
    };

    try {
      const response = await this.serverCall('submitBudgetLine', formData);
      if (response.error) throw new Error(response.message);

      if (typeof Components !== 'undefined') {
        Components.showToast('Budget line saved', 'success');
      }

      this.resetBudgetForm();
      await this.refreshManageData();
      this.state.hasInitialized = false;
      await this.fetchData(true);

    } catch (error) {
      console.error(error);
      if (typeof Components !== 'undefined') {
        Components.showToast(error.message || 'Failed to save budget line', 'error');
      }
    }
  },

  async handleDeleteBudgetLine(type, category) {
    const confirmed = window.confirm(`Delete the "${category}" budget line?`);
    if (!confirmed) return;

    try {
      const response = await this.serverCall('deleteBudgetLine', type, category);
      if (response.error) throw new Error(response.message);

      if (typeof Components !== 'undefined') {
        Components.showToast('Budget line deleted', 'success');
      }

      await this.refreshManageData();
      this.state.hasInitialized = false;
      await this.fetchData(true);

    } catch (error) {
      console.error(error);
      if (typeof Components !== 'undefined') {
        Components.showToast(error.message || 'Failed to delete budget line', 'error');
      }
    }
  },

  //==========================================================================
  // Transaction Modal & Form Logic
  //==========================================================================

  initModal() {
    const backdrop = document.getElementById('modal-backdrop');
    const closeBtn = document.getElementById('btn-close-modal');
    const form = document.getElementById('transaction-form');

    backdrop?.addEventListener('click', () => this.closeModal());
    closeBtn?.addEventListener('click', () => this.closeModal());
    
    form?.addEventListener('submit', (e) => {
      e.preventDefault();
      this.submitTransaction();
    });
  },

  openModal(type, existingTx = null) {
    if (!this.state.payload) return;

    const modal = document.getElementById('transaction-modal');
    const panel = document.getElementById('modal-panel');
    const title = document.getElementById('modal-title');
    const typeInput = document.getElementById('tx-type');
    const targetContainer = document.getElementById('transfer-target-container');
    const toAccountInput = document.getElementById('tx-to-account');
    const submitText = document.getElementById('submit-text');

    document.getElementById('transaction-form').reset();

    this.state.editingTransactionId = existingTx ? existingTx.id : null;

    title.textContent = existingTx ? `Edit ${type}` : `Add ${type}`;
    submitText.textContent = existingTx ? 'Update Transaction' : 'Save Transaction';
    typeInput.value = type;

    if (type === 'Transfer') {
      targetContainer.classList.remove('hidden');
      toAccountInput.required = true;
    } else {
      targetContainer.classList.add('hidden');
      toAccountInput.required = false;
      toAccountInput.value = '';
    }

    this.populateModalDropdowns(type, existingTx);

    if (existingTx) {
      document.getElementById('tx-amount').value = existingTx.amount;
      document.getElementById('tx-desc').value = existingTx.desc;
      document.getElementById('tx-category').value = existingTx.category;

      const accountSelect = document.getElementById('tx-account');
      accountSelect.value = existingTx.fromAccount || existingTx.toAccount;
      accountSelect.dispatchEvent(new Event('change'));
    }

    modal.classList.remove('opacity-0', 'pointer-events-none');
    setTimeout(() => {
      panel.classList.remove('scale-95');
      panel.classList.add('scale-100');
    }, 10);
    
    this.state.modalOpen = true;
    setTimeout(() => document.getElementById('tx-amount').focus(), 100);
  },

  closeModal() {
    const modal = document.getElementById('transaction-modal');
    const panel = document.getElementById('modal-panel');

    panel.classList.remove('scale-100');
    panel.classList.add('scale-95');
    
    setTimeout(() => {
      modal.classList.add('opacity-0', 'pointer-events-none');
      this.state.modalOpen = false;
      this.state.editingTransactionId = null;
    }, 200);
  },

  populateModalDropdowns(type, existingTx = null) {
    const categorySelect = document.getElementById('tx-category');
    const accountSelect = document.getElementById('tx-account');
    const toAccountSelect = document.getElementById('tx-to-account');

    let categories = [];
    if (type === 'Expense') {
      categories = this.state.payload.expenses.map(e => e.category);
      if (categories.length === 0) categories = ['General', 'Food', 'Transport'];
    } else if (type === 'Income') {
      categories = ['Salary', 'Business', 'Investment', 'Other'];
    } else if (type === 'Transfer') {
      categories = ['Internal Transfer'];
    } else if (type === 'Saving') {
      categories = this.state.payload.savings.map(s => s.category);
      if (categories.length === 0) categories = ['Emergency Fund'];
    } else if (type === 'Bank Charge') {
      categories = ['Bank Charge'];
    } else if (type === 'Receivable') {
      categories = ['Receivable'];
    }

    if (existingTx && existingTx.category && !categories.includes(existingTx.category)) {
      categories = [existingTx.category, ...categories];
    }

    categorySelect.innerHTML = categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');

    const accounts = this.state.payload.accounts
      .map(a => a.name)
      .sort((a, b) => a.localeCompare(b));
    const accountOptions = accounts.map(acc => `<option value="${acc}">${acc}</option>`).join('');
    
    accountSelect.innerHTML = accountOptions;

    if (toAccountSelect) {
      toAccountSelect.innerHTML =
        `<option value="" disabled selected>Select destination...</option>` +
        accountOptions;

      accountSelect.onchange = () => {
        const source = accountSelect.value;

        toAccountSelect.innerHTML =
          `<option value="" disabled selected>Select destination...</option>` +
          accounts
            .filter(acc => acc !== source)
            .map(acc => `<option value="${acc}">${acc}</option>`)
            .join('');

        if (existingTx && existingTx.type === 'Transfer' && existingTx.toAccount) {
          toAccountSelect.value = existingTx.toAccount;
        }
      };

      accountSelect.dispatchEvent(new Event('change'));
    }
  },

  async submitTransaction() {

    const submitBtn = document.getElementById('btn-submit-tx');
    const spinner = document.getElementById('submit-spinner');
    const text = document.getElementById('submit-text');

    const type = document.getElementById('tx-type').value;
    const selectedAccount = document.getElementById('tx-account').value;
    const transferDestination = document.getElementById('tx-to-account').value || '';

    const formData = {
      type: type,
      amount: document.getElementById('tx-amount').value,
      description: document.getElementById('tx-desc').value,
      category: document.getElementById('tx-category').value,
      account: selectedAccount,
      toAccount: transferDestination,
      notes: 'Dashboard Entry'
    };

    if (type === 'Transfer' && selectedAccount === transferDestination) {
      if (typeof Components !== 'undefined') {
        Components.showToast('Source and Destination accounts must be different', 'error');
      }
      return;
    }

    const editingId = this.state.editingTransactionId;

    submitBtn.disabled = true;
    spinner.classList.remove('hidden');
    text.textContent = editingId ? 'Updating...' : 'Saving...';

    try {

      const response = editingId
        ? await this.serverCall('updateTransaction', editingId, formData)
        : await this.serverCall('submitNewTransaction', formData);

      if (response.error) {
        throw new Error(response.message);
      }

      this.closeModal();

      if (typeof Components !== 'undefined') {
        Components.showToast(
          editingId ? 'Transaction updated successfully' : 'Transaction saved successfully',
          'success'
        );
      }

      const refreshBtn = document.getElementById('refresh-btn');
      const refreshIcon = refreshBtn?.querySelector('svg, i');
      if (refreshIcon) refreshIcon.classList.add('animate-spin');

      this.state.hasInitialized = false;
      await this.fetchData(true);

      const currentIcon = refreshBtn?.querySelector('svg, i');
      if (currentIcon) currentIcon.classList.remove('animate-spin');

    } catch (error) {

      console.error(error);

      if (typeof Components !== 'undefined') {
        Components.showToast(
          error.message || 'Failed to save transaction',
          'error'
        );
      }

    } finally {

      submitBtn.disabled = false;
      spinner.classList.add('hidden');
      text.textContent = 'Save Transaction';

    }

  },

  async handleDeleteTransaction(id) {
    if (!id) return;

    const confirmed = window.confirm('Delete this transaction? This cannot be undone.');
    if (!confirmed) return;

    try {
      const response = await this.serverCall('deleteTransaction', id);
      if (response.error) throw new Error(response.message);

      if (typeof Components !== 'undefined') {
        Components.showToast('Transaction deleted', 'success');
      }

      this.state.hasInitialized = false;
      await this.fetchData(true);

    } catch (error) {
      console.error(error);
      if (typeof Components !== 'undefined') {
        Components.showToast(error.message || 'Failed to delete transaction', 'error');
      }
    }
  }

};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
