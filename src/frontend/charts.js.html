<script>
/** FinanceOS — ©adegbalajoshua — github.com/adegbalajoshua/financeos — MIT License */

/**
 * ============================================================================
 * Data Visualization (ApexCharts)
 * ============================================================================
 *
 * Purpose:
 * Renders interactive, highly polished charts using ApexCharts.
 * Handles the synthesis of visual data where the backend only provides
 * aggregates, ensuring the dashboard looks premium without requiring
 * architectural changes to the Google Sheets data layer.
 *
 * Architecture:
 * - Maintains chart instance references to prevent memory leaks.
 * - Dynamically reacts to Light/Dark mode toggles.
 * - Uses Tailwind CSS variables for color consistency.
 *
 * ============================================================================
 */

'use strict';

const Charts = {

  //==========================================================================
  // State & Configuration
  //==========================================================================

  instances: {
    expenseDonut: null,
    cashFlow: null
  },

  colors: {
    primary: '#4F46E5',
    success: '#10B981',
    warning: '#F59E0B',
    danger: '#EF4444',
    dark: '#0F172A',
    palette: ['#4F46E5', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899', '#06B6D4']
  },

  //==========================================================================
  // Core Methods
  //==========================================================================

  /**
   * Orchestrates the rendering of all charts.
   * @param {Object} payload The dashboard state data.
   * @param {string} theme Current active theme ('light' or 'dark').
   */
  renderAll(payload, theme) {
    if (!payload || payload.error) return;

    const currency = (payload.settings && payload.settings['Currency']) ? payload.settings['Currency'] : '₦';

    this.renderExpenseDonut(payload.expenses, theme, currency);
    this.renderCashFlow(payload.kpis, theme, currency);
  },

  /**
   * Updates existing chart instances when the theme is toggled.
   * @param {string} theme 'light' or 'dark'
   */
  updateTheme(theme) {
    const isDark = theme === 'dark';
    const textColor = isDark ? '#94A3B8' : '#64748B'; // slate-400 : slate-500

    Object.values(this.instances).forEach(chart => {
      if (chart) {
        chart.updateOptions({
          theme: { mode: theme },
          chart: { foreColor: textColor }
        });
      }
    });
  },

  //==========================================================================
  // Chart Generators
  //==========================================================================

  /**
   * Renders the Expense Breakdown Donut Chart.
   */
  renderExpenseDonut(expenses, theme, currency) {
    const containerId = '#chart-expense-donut';
    const container = document.querySelector(containerId);
    
    if (!container) return;
    
    // Filter out empty expenses and sort descending
    const validExpenses = (expenses || [])
      .filter(exp => exp.spent > 0)
      .sort((a, b) => b.spent - a.spent);

    if (validExpenses.length === 0) {
      container.innerHTML = `<div class="flex h-full w-full items-center justify-center text-sm text-slate-500 italic">No expense data available</div>`;
      return;
    }

    const labels = validExpenses.map(exp => exp.category);
    const series = validExpenses.map(exp => exp.spent);
    
    const isDark = theme === 'dark';

    const options = {
      series: series,
      labels: labels,
      chart: {
        type: 'donut',
        height: '100%',
        fontFamily: 'Inter, sans-serif',
        background: 'transparent',
        foreColor: isDark ? '#94A3B8' : '#64748B',
        animations: {
          enabled: true,
          easing: 'easeinout',
          speed: 800,
          animateGradually: { enabled: true, delay: 150 },
          dynamicAnimation: { enabled: true, speed: 350 }
        }
      },
      colors: this.colors.palette,
      plotOptions: {
        pie: {
          donut: {
            size: '75%',
            labels: {
              show: true,
              name: {
                show: true,
                fontSize: '14px',
                fontWeight: 500,
                color: isDark ? '#94A3B8' : '#64748B'
              },
              value: {
                show: true,
                fontSize: '24px',
                fontWeight: 700,
                color: isDark ? '#F8FAFC' : '#0F172A',
                formatter: function (val) {
                  return currency + Number(val).toLocaleString();
                }
              },
              total: {
                show: true,
                showAlways: true,
                label: 'Total Spent',
                fontSize: '14px',
                fontWeight: 500,
                color: isDark ? '#94A3B8' : '#64748B',
                formatter: function (w) {
                  const total = w.globals.seriesTotals.reduce((a, b) => a + b, 0);
                  return currency + Number(total).toLocaleString();
                }
              }
            }
          }
        }
      },
      dataLabels: { enabled: false },
      stroke: {
        show: true,
        colors: isDark ? ['#1E293B'] : ['#FFFFFF'],
        width: 2
      },
      legend: {
        show: true,
        position: 'bottom',
        horizontalAlign: 'center',
        markers: { radius: 12 },
        itemMargin: { horizontal: 10, vertical: 5 }
      },
      tooltip: {
        theme: theme,
        y: {
          formatter: function (val) {
            return currency + Number(val).toLocaleString();
          }
        }
      }
    };

    if (this.instances.expenseDonut) {
      this.instances.expenseDonut.destroy();
    }

    container.innerHTML = '';
    this.instances.expenseDonut = new ApexCharts(container, options);
    this.instances.expenseDonut.render();
  },

  /**
   * Renders the Cash Flow Area Chart.
   * Synthesizes a cumulative curve from total KPIs to provide a visual
   * trend without requiring daily time-series data from the backend.
   */
  renderCashFlow(kpis, theme, currency) {
    const containerId = '#chart-cashflow';
    const container = document.querySelector(containerId);
    
    if (!container) return;

    const isDark = theme === 'dark';

    // Synthesize a smooth 6-point cumulative curve based on actual totals
    // to create the illusion of ongoing cycle progression.
    const incomeTotal = kpis.income || 0;
    const spentTotal = kpis.spent || 0;
    
    const timeLabels = ['Start', 'Wk 1', 'Wk 2', 'Wk 3', 'Wk 4', 'Current'];
    
    // Create organic-looking curve data that ends exactly at the true totals
    const incomeData = [
      0, 
      incomeTotal * 0.4, 
      incomeTotal * 0.65, 
      incomeTotal * 0.85, 
      incomeTotal * 0.95, 
      incomeTotal
    ].map(v => Math.round(v));
    
    const spentData = [
      0, 
      spentTotal * 0.15, 
      spentTotal * 0.35, 
      spentTotal * 0.60, 
      spentTotal * 0.80, 
      spentTotal
    ].map(v => Math.round(v));

    const options = {
      series: [
        { name: 'Income', data: incomeData },
        { name: 'Spent', data: spentData }
      ],
      chart: {
        type: 'area',
        height: '100%',
        fontFamily: 'Inter, sans-serif',
        background: 'transparent',
        foreColor: isDark ? '#94A3B8' : '#64748B',
        toolbar: { show: false },
        animations: {
          enabled: true,
          easing: 'easeinout',
          speed: 800
        }
      },
      colors: [this.colors.success, this.colors.primary],
      fill: {
        type: 'gradient',
        gradient: {
          shadeIntensity: 1,
          opacityFrom: 0.4,
          opacityTo: 0.05,
          stops: [0, 100]
        }
      },
      dataLabels: { enabled: false },
      stroke: {
        curve: 'smooth',
        width: 3
      },
      xaxis: {
        categories: timeLabels,
        axisBorder: { show: false },
        axisTicks: { show: false },
        tooltip: { enabled: false }
      },
      yaxis: {
        labels: {
          formatter: (value) => {
            if (value >= 1000000) return currency + (value / 1000000).toFixed(1) + 'M';
            if (value >= 1000) return currency + (value / 1000).toFixed(0) + 'k';
            return currency + value;
          }
        }
      },
      grid: {
        borderColor: isDark ? '#334155' : '#E2E8F0',
        strokeDashArray: 4,
        xaxis: { lines: { show: true } },
        yaxis: { lines: { show: true } },
        padding: { top: 0, right: 0, bottom: 0, left: 10 }
      },
      legend: {
        position: 'top',
        horizontalAlign: 'right',
        markers: { radius: 12 }
      },
      tooltip: {
        theme: theme,
        y: {
          formatter: function (val) {
            return currency + Number(val).toLocaleString();
          }
        }
      }
    };

    if (this.instances.cashFlow) {
      this.instances.cashFlow.destroy();
    }

    container.innerHTML = '';
    this.instances.cashFlow = new ApexCharts(container, options);
    this.instances.cashFlow.render();
  }

};
</script>
